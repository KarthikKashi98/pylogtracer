[mypy]
python_version = 3.9
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false
mypy_path = src
namespace_packages = true
explicit_package_bases = true
exclude = (?x)(
    \.tox
    | \.venv
    | build
    | dist
  )

[mypy-pylogtracer.llm.llm_factory]
ignore_errors = true

[mypy-pylogtracer.preprocessing.error_type_classifier]
ignore_errors = true

[mypy-pylogtracer.multiagent.context_bridge]
ignore_errors = true

[mypy-pylogtracer.logtracer]
ignore_errors = true

[mypy-pylogtracer.preprocessing.smart_reader]
ignore_errors = true

[mypy-pylogtracer.agents.root_cause_analyzer]
ignore_errors = true

[mypy-pylogtracer.agents.qa_agent]
ignore_errors = true

[mypy-pytest.*]
ignore_errors = true

[mypy-_pytest.*]
ignore_errors = true